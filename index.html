<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Henry's Training Program</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #ffffff; --bg2: #f5f5f3; --bg3: #eeede9;
  --text: #1a1a18; --text2: #5a5a56; --text3: #8a8a84;
  --border: rgba(0,0,0,0.1); --border2: rgba(0,0,0,0.18);
  --accent: #1a9e6e; --accent2: #e07b2a; --accent3: #4a7fd4;
  --danger: #c94040;
  --radius-md: 8px; --radius-lg: 12px;
}
@media (prefers-color-scheme: dark) {
  :root { --bg:#1c1c1a; --bg2:#252523; --bg3:#2e2e2b; --text:#e8e6de; --text2:#9a9890; --text3:#6a6860; --border:rgba(255,255,255,0.1); --border2:rgba(255,255,255,0.18); }
}
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); }
.wrap { max-width: 720px; margin: 0 auto; padding: 1.5rem 1rem 4rem; }
.app-header h1 { font-size: 22px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
.app-header p { font-size: 13px; color: var(--text2); margin-bottom: 1.25rem; }
.month-tabs { display: flex; gap: 6px; margin-bottom: 1.25rem; }
.month-tab { padding: 8px 20px; border-radius: var(--radius-md); border: 1px solid var(--border2); font-size: 14px; font-weight: 500; cursor: pointer; background: var(--bg2); color: var(--text2); transition: all 0.15s; font-family: inherit; }
.month-tab.active { background: var(--accent); border-color: var(--accent); color: #fff; }
.week-tabs { display: flex; gap: 6px; margin-bottom: 0.75rem; flex-wrap: wrap; }
.week-tab { padding: 6px 14px; border-radius: var(--radius-md); border: 1px solid var(--border2); font-size: 13px; cursor: pointer; background: var(--bg2); color: var(--text2); transition: all 0.15s; font-family: inherit; }
.week-tab.active { background: var(--accent2); border-color: var(--accent2); color: #fff; }
.week-note { padding: 10px 14px; background: var(--bg2); border-radius: var(--radius-md); margin-bottom: 1rem; font-size: 13px; color: var(--text2); border-left: 3px solid var(--accent2); line-height: 1.6; }
.legend { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 1rem; }
.legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--text2); }
.legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.day-grid { display: flex; flex-direction: column; gap: 8px; }
.day-card { border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; background: var(--bg); }
.day-header { padding: 12px 14px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; user-select: none; }
.day-header:hover { background: var(--bg2); }
.day-header-left { display: flex; align-items: center; gap: 10px; }
.day-pill { font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 999px; white-space: nowrap; }
.pill-lower { background: #e8f5ee; color: #1a7a50; }
.pill-upper { background: #e8f0fa; color: #2a5aaa; }
.pill-rest { background: var(--bg2); color: var(--text3); border: 1px solid var(--border); }
@media (prefers-color-scheme: dark) {
  .pill-lower { background:#0e3d28; color:#5ecb96; }
  .pill-upper { background:#0e2040; color:#7aaaf0; }
}
.day-name { font-size: 15px; font-weight: 600; color: var(--text); }
.day-subtitle { font-size: 12px; color: var(--text3); margin-top: 1px; }
.day-meta { display: flex; align-items: center; gap: 8px; }
.time-badge { font-size: 11px; padding: 2px 8px; border-radius: 999px; background: var(--bg2); color: var(--text3); border: 1px solid var(--border); white-space: nowrap; }
.time-badge.longer { background: #fdf0e0; color: #a06010; border-color: #f0c070; }
.chevron { font-size: 11px; color: var(--text3); transition: transform 0.2s; }
.chevron.open { transform: rotate(180deg); }
.day-body { display: none; border-top: 1px solid var(--border); }
.day-body.open { display: block; }
.section-label { font-size: 11px; font-weight: 600; color: var(--text3); letter-spacing: 0.06em; text-transform: uppercase; padding: 10px 14px 4px; }
.superset-group { border-left: 3px solid #c07af0; margin-left: 14px; }
.superset-group .exercise-row { padding-left: 10px; }
.exercise-row { padding: 9px 14px; border-bottom: 1px solid var(--border); }
.exercise-row:last-child { border-bottom: none; }
.ex-top { display: grid; grid-template-columns: 1fr auto; gap: 10px; align-items: start; }
.ex-name { font-size: 13px; font-weight: 600; color: var(--text); }
.ex-note { font-size: 12px; color: var(--text2); margin-top: 2px; line-height: 1.4; }
.ex-tags { margin-top: 3px; }
.ex-badge { text-align: right; }
.ex-sets-label { font-size: 13px; color: var(--text2); white-space: nowrap; }
.ex-weight-badge { font-size: 11px; padding: 2px 8px; border-radius: 999px; margin-top: 4px; display: inline-block; font-weight: 500; }
.w-heavy { background: #fde8e8; color: #993030; }
.w-medium { background: #fdf0e0; color: #a06010; }
.w-light { background: #e8f5ee; color: #1a7a50; }
.w-bw { background: var(--bg2); color: var(--text3); }
.w-iso { background: #f5e8fa; color: #7a2aaa; }
@media (prefers-color-scheme: dark) {
  .w-heavy { background:#3d1010; color:#f08080; }
  .w-medium { background:#3d2a08; color:#f0a850; }
  .w-light { background:#0e3020; color:#60c090; }
  .w-iso { background:#2d1040; color:#c080f0; }
}
.tag { font-size: 11px; padding: 1px 7px; border-radius: 999px; display: inline-block; margin-right: 3px; font-weight: 500; }
.tag-outside { color: #185fa5; background: #e6f1fb; }
.tag-superset { color: #7a2aaa; background: #f5e8fa; }
.tag-core { color: #1a7a50; background: #e8f5ee; }
.tag-morning { color: #185fa5; background: #e0ecfa; }
.tag-pap { color: #a06010; background: #fdf0e0; }
@media (prefers-color-scheme: dark) {
  .tag-outside { background:#0c2a40; color:#70b0f0; }
  .tag-superset { background:#2d1040; color:#c080f0; }
  .tag-core { background:#0e3020; color:#60c090; }
}
.log-area { margin-top: 8px; }
.log-entries { margin-bottom: 6px; }
.log-entry { display: flex; align-items: center; justify-content: space-between; padding: 5px 8px; background: var(--bg2); border-radius: var(--radius-md); margin-bottom: 4px; font-size: 12px; }
.log-entry-text { color: var(--text); font-weight: 500; flex: 1; }
.log-entry-date { font-size: 11px; color: var(--text3); margin: 0 8px; white-space: nowrap; }
.log-delete { background: none; border: none; color: var(--danger); cursor: pointer; font-size: 15px; padding: 0 2px; line-height: 1; font-family: inherit; flex-shrink: 0; }
.log-delete:hover { opacity: 0.7; }
.log-toggle-btn { font-size: 11px; color: var(--accent3); cursor: pointer; background: none; border: none; font-family: inherit; padding: 0; margin-top: 4px; display: inline-block; }
.log-form { margin-top: 6px; background: var(--bg2); border-radius: var(--radius-md); padding: 8px 10px; }
.log-form-title { font-size: 11px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; }
.log-fields { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 8px; }
.log-field { display: flex; flex-direction: column; gap: 3px; }
.log-field label { font-size: 11px; color: var(--text3); }
.log-field input, .log-field textarea { padding: 6px 8px; border-radius: var(--radius-md); border: 1px solid var(--border2); background: var(--bg); color: var(--text); font-size: 13px; font-family: inherit; }
.log-field input:focus, .log-field textarea:focus { outline: none; border-color: var(--accent); }
.log-field.full { grid-column: 1 / -1; }
.log-field textarea { resize: none; height: 52px; font-size: 12px; }
.log-actions { display: flex; gap: 8px; }
.log-save-btn { padding: 6px 16px; border-radius: var(--radius-md); border: none; background: var(--accent); color: #fff; font-size: 13px; font-weight: 500; cursor: pointer; font-family: inherit; }
.log-save-btn:hover { opacity: 0.85; }
.log-cancel-btn { padding: 6px 12px; border-radius: var(--radius-md); border: 1px solid var(--border2); background: none; color: var(--text2); font-size: 13px; cursor: pointer; font-family: inherit; }
.core-block { background: var(--bg2); margin: 8px 14px; border-radius: var(--radius-md); padding: 8px 10px; }
.core-block-title { font-size: 11px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; display: flex; align-items: center; gap: 6px; }
.core-row { display: flex; justify-content: space-between; align-items: center; padding: 5px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
.core-row:last-child { border-bottom: none; }
.core-row-name { color: var(--text); font-weight: 500; }
.core-row-sets { color: var(--text2); }
.pap-box { background: #fdf5e0; border-left: 3px solid #e07b2a; border-radius: var(--radius-md); margin: 8px 14px; padding: 8px 12px; font-size: 12px; color: #7a4810; line-height: 1.5; }
@media (prefers-color-scheme: dark) { .pap-box { background: #2a1e08; color: #f0b060; } }
.pap-box strong { font-weight: 600; }
footer { margin-top: 3rem; text-align: center; font-size: 12px; color: var(--text3); }
</style>
</head>

<div class="wrap">

// ─── STATE ────────────────────────────────────────────────────────────────────
let currentMonth = 1;
let currentWeek  = 1;
let openDays     = new Set();
let openForms    = new Set();

function storageKey(month, week, dayIdx, exName) {
  return 'log_m' + month + '_w' + week + '_d' + dayIdx + '_' + exName.replace(/\W+/g,'_').substring(0,30);
}
function getLogs(month, week, dayIdx, exName) {
  try { const r = localStorage.getItem(storageKey(month,week,dayIdx,exName)); return r ? JSON.parse(r) : []; }
  catch(e) { return []; }
}
function saveLogs(month, week, dayIdx, exName, logs) {
  try { localStorage.setItem(storageKey(month,week,dayIdx,exName), JSON.stringify(logs)); }
  catch(e) {}
}
function addLog(month, week, dayIdx, exName, uid) {
  const weightEl = document.getElementById('lw-'+uid);
  const setsEl   = document.getElementById('ls-'+uid);
  const repsEl   = document.getElementById('lr-'+uid);
  const noteEl   = document.getElementById('ln-'+uid);
  const weight = weightEl ? weightEl.value.trim() : '';
  const sets   = setsEl   ? setsEl.value.trim()   : '';
  const reps   = repsEl   ? repsEl.value.trim()   : '';
  const note   = noteEl   ? noteEl.value.trim()   : '';
  if (!weight && !sets && !reps && !note) return;
  const logs = getLogs(month, week, dayIdx, exName);
  const date = new Date().toLocaleDateString('en-US', {month:'short', day:'numeric'});
  logs.push({ weight, sets, reps, note, date });
  saveLogs(month, week, dayIdx, exName, logs);
  openForms.delete(uid);
  renderWeek();
}
function deleteLog(month, week, dayIdx, exName, idx) {
  const logs = getLogs(month, week, dayIdx, exName);
  logs.splice(idx, 1);
  saveLogs(month, week, dayIdx, exName, logs);
  renderWeek();
}
function setMonth(m) {
  currentMonth = m;
  currentWeek  = 1;
  openDays     = new Set();
  openForms    = new Set();
  document.querySelectorAll('.month-tab').forEach((t,i) => t.classList.toggle('active', i+1===m));
  renderWeekTabs();
  renderWeek();
}
function setWeek(w) {
  currentWeek = w;
  openDays    = new Set();
  openForms   = new Set();
  document.querySelectorAll('.week-tab').forEach((t,i) => t.classList.toggle('active', i+1===w));
  renderWeek();
}
function renderWeekTabs() {
  document.getElementById('week-tabs').innerHTML = [1,2,3,4].map((w,i) =>
    '<div class="week-tab' + (i===0?' active':'') + '" onclick="setWeek('+w+')">Week '+w+'</div>'
  ).join('');
}
function toggleDay(idx) {
  if (openDays.has(idx)) openDays.delete(idx); else openDays.add(idx);
  renderWeek();
}
function toggleForm(uid) {
  if (openForms.has(uid)) openForms.delete(uid); else openForms.add(uid);
  renderWeek();
}
function weightBadge(w) {
  const map = {heavy:['w-heavy','Heavy'],medium:['w-medium','Moderate'],light:['w-light','Light'],bw:['w-bw','Bodyweight'],iso:['w-iso','Isometric']};
  const [cls,label] = map[w]||['w-bw','—'];
  return '<span class="ex-weight-badge ' + cls + '">' + label + '</span>';
}
function tagsHtml(tags) {
  if (!tags || !tags.length) return '';
  return tags.map(function(t) {
    if (t==='outside')  return '<span class="tag tag-outside">outside gym</span>';
    if (t==='superset') return '<span class="tag tag-superset">superset</span>';
    if (t==='morning')  return '<span class="tag tag-morning">morning</span>';
    if (t==='pap')      return '<span class="tag tag-pap">PAP primer</span>';
    return '';
  }).join('');
}
function pillClass(t) {
  return {lower:'pill-lower',upper:'pill-upper',rest:'pill-rest'}[t]||'pill-rest';
}
function renderExercise(ex, dayIdx, secTitle) {
  var uid = ('m'+currentMonth+'w'+currentWeek+'d'+dayIdx+'_'+(ex.name+secTitle).replace(/\W/g,'').substring(0,24));
  var needsLog = ex.weight && ex.weight!=='bw' && ex.weight!=='iso';
  var logs = needsLog ? getLogs(currentMonth, currentWeek, dayIdx, ex.name) : [];
  var formOpen = openForms.has(uid);
  var logHtml = '';
  if (needsLog) {
    var entries = '';
    for (var i=0; i<logs.length; i++) {
      var l = logs[i];
      var parts = [];
      if (l.weight) parts.push(l.weight + ' lbs');
      if (l.sets)   parts.push(l.sets + ' sets');
      if (l.reps)   parts.push(l.reps + ' reps');
      var summary = parts.join(' · ');
      if (l.note) summary += (summary ? ' — ' : '') + l.note;
      entries += '<div class="log-entry">'
        + '<span class="log-entry-text">' + (summary||'—') + '</span>'
        + '<span class="log-entry-date">' + (l.date||'') + '</span>'
        + '<button class="log-delete" onclick="event.stopPropagation();deleteLog('+currentMonth+','+currentWeek+','+dayIdx+',\''+ex.name.replace(/'/g,"\\'")+'\',' + i + ')" title="Delete">✕</button>'
        + '</div>';
    }
    if (entries) logHtml += '<div class="log-entries">' + entries + '</div>';
    if (formOpen) {
      logHtml += '<div class="log-form">'
        + '<div class="log-form-title">Log this exercise</div>'
        + '<div class="log-fields">'
        + '<div class="log-field"><label>Weight (lbs)</label><input id="lw-'+uid+'" type="number" placeholder="e.g. 185" min="0" step="2.5"></div>'
        + '<div class="log-field"><label>Sets completed</label><input id="ls-'+uid+'" type="number" placeholder="e.g. 4" min="0" step="1"></div>'
        + '<div class="log-field"><label>Reps per set</label><input id="lr-'+uid+'" type="number" placeholder="e.g. 6" min="0" step="1"></div>'
        + '<div class="log-field"><label>Notes (optional)</label><input id="ln-'+uid+'" type="text" placeholder="e.g. felt heavy, form good..."></div>'
        + '</div>'
        + '<div class="log-actions">'
        + '<button class="log-save-btn" onclick="event.stopPropagation();addLog('+currentMonth+','+currentWeek+','+dayIdx+',\''+ex.name.replace(/'/g,"\\'")+'\',\''+uid+'\')">Save</button>'
        + '<button class="log-cancel-btn" onclick="event.stopPropagation();toggleForm(\''+uid+'\')">Cancel</button>'
        + '</div></div>';
    } else {
      logHtml += '<button class="log-toggle-btn" onclick="event.stopPropagation();toggleForm(\''+uid+'\')">+ Log this exercise</button>';
    }
    logHtml = '<div class="log-area">' + logHtml + '</div>';
  }
  return '<div class="exercise-row">'
    + '<div class="ex-top">'
    + '<div>'
    + '<div class="ex-name">' + ex.name + '</div>'
    + (ex.note ? '<div class="ex-note">' + ex.note + '</div>' : '')
    + '<div class="ex-tags">' + tagsHtml(ex.tags) + '</div>'
    + logHtml
    + '</div>'
    + '<div class="ex-badge">'
    + '<div class="ex-sets-label">' + ex.sets + '</div>'
    + (ex.weight ? weightBadge(ex.weight) : '')
    + '</div>'
    + '</div>'
    + '</div>';
}
function renderWeek() {
  var data = months[currentMonth][currentWeek];
  document.getElementById('week-note').textContent = data.note;
  var grid = document.getElementById('day-grid');
  var html = '';
  for (var di=0; di<data.days.length; di++) {
    var day = data.days[di];
    var isOpen = openDays.has(di);
    var isLong = day.time && (day.time.indexOf('50')>=0 || day.time.indexOf('60')>=0);
    var bodyHtml = '';
    for (var si=0; si<day.sections.length; si++) {
      var sec = day.sections[si];
      if (sec.isCoreBlock) {
        var coreRows = '';
        for (var ci=0; ci<sec.exercises.length; ci++) {
          var ce = sec.exercises[ci];
          coreRows += '<div class="core-row"><span class="core-row-name">' + ce.name + (ce.note ? ' <span style="font-weight:400;color:var(--text3);font-size:11px">— '+ce.note+'</span>' : '') + '</span><span class="core-row-sets">' + ce.sets + '</span></div>';
        }
        bodyHtml += '<div class="core-block"><div class="core-block-title">Core block <span class="tag tag-core">do anytime</span></div>' + coreRows + '</div>';
        continue;
      }
      if (sec.isPapSection) {
        bodyHtml += '<div class="pap-box"><strong>Morning session</strong> — do before school on Wednesday. The PAP squat primer is backed by peer-reviewed research to increase jump height 4–8 minutes after heavy squats. At your strength level (~1.47× BW squat), this effect is significant. Rest 4–6 min after the primer before approaching the rim.</div>';
      }
      var rows = '';
      for (var ei=0; ei<sec.exercises.length; ei++) {
        rows += renderExercise(sec.exercises[ei], di, sec.title);
      }
      if (sec.isSuperset) {
        bodyHtml += '<div class="section-label">' + sec.title + '</div><div class="superset-group">' + rows + '</div>';
      } else {
        bodyHtml += '<div class="section-label">' + sec.title + '</div>' + rows;
      }
    }
    html += '<div class="day-card">'
      + '<div class="day-header" onclick="toggleDay(' + di + ')">'
      + '<div class="day-header-left">'
      + '<span class="day-pill ' + pillClass(day.type) + '">' + day.label + '</span>'
      + '<div><div class="day-name">' + day.name + '</div><div class="day-subtitle">' + day.subtitle + '</div></div>'
      + '</div>'
      + '<div class="day-meta">'
      + '<span class="time-badge' + (isLong?' longer':'') + '">' + day.time + '</span>'
      + '<span class="chevron' + (isOpen?' open':'') + '">▼</span>'
      + '</div></div>'
      + '<div class="day-body' + (isOpen?' open':'') + '">' + bodyHtml + '</div>'
      + '</div>';
  }
  grid.innerHTML = html;
}
renderWeekTabs();
renderWeek();
</script>
