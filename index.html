<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Henry's Training</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0f1117; --bg2: #181c27; --bg3: #1e2334; --bg4: #242840;
  --border: #2a2f42; --border2: #333852;
  --text: #e8eaf0; --text2: #9aa0b8; --text3: #5a617a;
  --accent: #22c78a; --accent-dim: #1a9e6e; --accent2: #f09040;
  --purple: #a87af0; --blue: #4a9eff; --red: #ff6b6b;
}
body { font-family: 'Inter', -apple-system, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; -webkit-tap-highlight-color: transparent; }

/* ── TOP NAV (months) ── */
.top-nav { background: var(--bg2); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
.top-nav-inner { display: flex; overflow-x: auto; scrollbar-width: none; padding: 0 4px; }
.top-nav-inner::-webkit-scrollbar { display: none; }
.month-tab { flex-shrink: 0; padding: 14px 18px; font-size: 13px; font-weight: 600; color: var(--text3); cursor: pointer; border: none; background: none; font-family: inherit; border-bottom: 2px solid transparent; transition: color 0.15s, border-color 0.15s; white-space: nowrap; }
.month-tab:hover { color: var(--text2); }
.month-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
.month-tab.locked { color: var(--text3); opacity: 0.4; cursor: default; }

/* ── BOTTOM NAV ── */
.bot-nav { position: fixed; bottom: 0; left: 0; right: 0; background: var(--bg2); border-top: 1px solid var(--border); display: flex; z-index: 100; }
.bot-btn { flex: 1; padding: 12px 6px 10px; font-size: 10px; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; color: var(--text3); cursor: pointer; border: none; background: none; font-family: inherit; display: flex; flex-direction: column; align-items: center; gap: 4px; transition: color 0.15s; }
.bot-btn svg { width: 20px; height: 20px; }
.bot-btn:hover { color: var(--text2); }
.bot-btn.active { color: var(--accent); }

/* ── VIEWS ── */
.view { display: none; padding: 1rem 0.75rem 5rem; max-width: 700px; margin: 0 auto; }
.view.active { display: block; }

/* ── WEEK TABS ── */
.week-tabs { display: flex; gap: 6px; margin-bottom: 1rem; flex-wrap: wrap; }
.week-tab { padding: 6px 14px; border-radius: 10px; border: 1px solid var(--border2); font-size: 13px; cursor: pointer; background: var(--bg2); color: var(--text2); transition: all 0.18s; font-family: inherit; font-weight: 500; }
.week-tab:hover { border-color: var(--accent-dim); color: var(--text); }
.week-tab.active { background: var(--accent); border-color: var(--accent); color: #000; font-weight: 700; }

/* ── WEEK NOTE ── */
.week-note { padding: 11px 14px; background: var(--bg2); border-radius: 10px; margin-bottom: 1rem; font-size: 13px; color: var(--text2); border-left: 2px solid var(--accent2); line-height: 1.65; }

/* ── LEGEND ── */
.legend { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 1rem; }
.legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--text3); }
.legend-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }

/* ── DAY CARDS ── */
.day-grid { display: flex; flex-direction: column; gap: 8px; }
.day-card { border: 1px solid var(--border); border-radius: 14px; overflow: hidden; background: var(--bg2); }
.day-header { padding: 12px 14px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; transition: background 0.12s; user-select: none; }
.day-header:hover { background: var(--bg3); }
.day-header:active { background: var(--bg4); }
.day-header-left { display: flex; align-items: center; gap: 10px; }
.day-pill { font-size: 10px; font-weight: 700; padding: 3px 9px; border-radius: 999px; letter-spacing: 0.04em; white-space: nowrap; }
.pill-lower { background: rgba(34,199,138,0.15); color: #22c78a; }
.pill-upper { background: rgba(74,158,255,0.15); color: #4a9eff; }
.pill-rest { background: var(--bg3); color: var(--text3); }
.day-name { font-size: 15px; font-weight: 600; }
.day-subtitle { font-size: 12px; color: var(--text2); margin-top: 2px; }
.day-meta { display: flex; align-items: center; gap: 7px; }
.time-badge { font-size: 11px; padding: 2px 8px; border-radius: 999px; background: var(--bg3); color: var(--text3); border: 1px solid var(--border); font-weight: 500; }
.time-badge.longer { background: rgba(240,144,64,0.1); color: var(--accent2); border-color: rgba(240,144,64,0.2); }
.chevron { font-size: 11px; color: var(--text3); transition: transform 0.3s cubic-bezier(0.4,0,0.2,1); display: inline-block; }
.chevron.open { transform: rotate(180deg); }
.day-body { border-top: 1px solid var(--border); overflow: hidden; max-height: 0; transition: max-height 0.4s cubic-bezier(0.4,0,0.2,1), opacity 0.3s ease; opacity: 0; }
.day-body.open { max-height: 4000px; opacity: 1; }

/* ── SECTION LABEL ── */
.section-label { font-size: 10px; font-weight: 700; color: var(--text3); letter-spacing: 0.09em; text-transform: uppercase; padding: 11px 14px 4px; }

/* ── EXERCISE ROWS (clickable) ── */
.exercise-row {
  display: grid; grid-template-columns: 1fr auto; gap: 8px;
  padding: 10px 14px; border-bottom: 1px solid var(--border);
  align-items: center; cursor: pointer;
  transition: background 0.12s; user-select: none;
}
.exercise-row:hover { background: var(--bg3); }
.exercise-row:active { background: var(--bg4); }
.exercise-row.not-logable { cursor: default; }
.exercise-row.not-logable:hover { background: transparent; }
.exercise-row.not-logable:active { background: transparent; }
.exercise-row:last-child { border-bottom: none; }
.ex-left { display: flex; flex-direction: column; gap: 2px; }
.ex-name { font-size: 14px; font-weight: 500; }
.ex-note { font-size: 12px; color: var(--text2); line-height: 1.4; }
.ex-tags { display: flex; gap: 4px; margin-top: 2px; flex-wrap: wrap; }
.ex-right { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; }
.ex-sets-badge { font-size: 12px; color: var(--text2); font-weight: 500; white-space: nowrap; }
.ex-logged-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); }
.ex-weight { font-size: 11px; padding: 2px 7px; border-radius: 999px; display: inline-block; font-weight: 600; }
.w-heavy { background: rgba(255,107,107,0.15); color: #ff8080; }
.w-medium { background: rgba(240,144,64,0.15); color: var(--accent2); }
.w-light { background: rgba(34,199,138,0.12); color: var(--accent); }
.w-bw { background: var(--bg3); color: var(--text3); }
.w-iso { background: rgba(168,122,240,0.15); color: var(--purple); }
.tag { font-size: 10px; padding: 2px 6px; border-radius: 999px; display: inline-block; font-weight: 500; }
.tag-outside { color: var(--blue); background: rgba(74,158,255,0.1); }
.tag-superset { color: var(--purple); background: rgba(168,122,240,0.1); }
.tag-core { color: var(--accent); background: rgba(34,199,138,0.1); }
.superset-group { border-left: 2px solid var(--purple); margin-left: 14px; }
.superset-group .exercise-row { padding-left: 10px; }
.core-block { background: var(--bg3); margin: 8px 14px; border-radius: 10px; padding: 9px 11px; border: 1px solid var(--border); }
.core-block-title { font-size: 10px; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 7px; }
.core-row { display: flex; justify-content: space-between; align-items: center; padding: 4px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
.core-row:last-child { border-bottom: none; }
.core-row-name { font-weight: 500; }
.core-row-sets { color: var(--text2); }

/* ── LOG INDICATOR on day header ── */
.day-log-count { font-size: 10px; background: rgba(34,199,138,0.15); color: var(--accent); padding: 2px 7px; border-radius: 999px; font-weight: 700; }

/* ── MODAL ── */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 200; display: none; align-items: flex-end; justify-content: center; }
.modal-overlay.open { display: flex; }
.modal { background: var(--bg2); border: 1px solid var(--border2); border-radius: 22px 22px 0 0; width: 100%; max-width: 520px; padding: 22px 20px 40px; animation: slideUp 0.25s cubic-bezier(0.4,0,0.2,1); }
@keyframes slideUp { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
.modal-handle { width: 36px; height: 4px; background: var(--border2); border-radius: 2px; margin: 0 auto 16px; }
.modal-title { font-size: 17px; font-weight: 700; margin-bottom: 3px; }
.modal-sub { font-size: 13px; color: var(--text2); margin-bottom: 18px; }
.modal-prev { background: var(--bg3); border-radius: 10px; padding: 9px 12px; margin-bottom: 16px; border: 1px solid var(--border); }
.modal-prev-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.07em; color: var(--text3); margin-bottom: 5px; }
.modal-prev-row { font-size: 13px; color: var(--text2); }
.modal-prev-pr { color: var(--accent2); font-weight: 600; }
.modal-sets { display: flex; flex-direction: column; gap: 9px; margin-bottom: 18px; max-height: 45vh; overflow-y: auto; }
.modal-set-row { display: flex; align-items: center; gap: 9px; }
.modal-set-label { font-size: 13px; color: var(--text2); min-width: 44px; font-weight: 600; }
.modal-input { flex: 1; background: var(--bg3); border: 1px solid var(--border2); border-radius: 10px; padding: 10px 13px; color: var(--text); font-size: 15px; font-family: inherit; outline: none; transition: border-color 0.15s; -webkit-appearance: none; text-align: center; }
.modal-input:focus { border-color: var(--accent); }
.modal-input::placeholder { color: var(--text3); }
.modal-input-label { font-size: 10px; color: var(--text3); text-align: center; margin-top: 2px; }
.modal-col { display: flex; flex-direction: column; flex: 1; }
.modal-actions { display: flex; gap: 9px; }
.btn { padding: 13px 20px; border-radius: 12px; font-size: 15px; font-weight: 700; cursor: pointer; font-family: inherit; border: none; transition: all 0.15s; }
.btn-primary { background: var(--accent); color: #000; flex: 1; }
.btn-primary:hover { background: #28e09a; }
.btn-primary:active { background: var(--accent-dim); }
.btn-secondary { background: var(--bg3); color: var(--text2); border: 1px solid var(--border2); min-width: 90px; }

/* ── TIMER ── */
.timer-bar { position: fixed; bottom: 60px; left: 0; right: 0; z-index: 90; pointer-events: none; display: flex; justify-content: center; padding: 0 16px 8px; }
.timer-pill { background: var(--bg2); border: 1px solid var(--border2); border-radius: 18px; padding: 11px 18px; display: flex; align-items: center; gap: 16px; box-shadow: 0 6px 30px rgba(0,0,0,0.55); pointer-events: all; transform: translateY(160px); transition: transform 0.35s cubic-bezier(0.4,0,0.2,1); }
.timer-pill.visible { transform: translateY(0); }
.timer-trigger { display: flex; gap: 7px; margin-bottom: 1.25rem; flex-wrap: wrap; align-items: center; }
.timer-trigger-btn { padding: 7px 14px; border-radius: 10px; border: 1px solid var(--border2); font-size: 13px; cursor: pointer; background: var(--bg2); color: var(--text2); font-family: inherit; font-weight: 500; transition: all 0.2s; }
.timer-trigger-btn:hover { border-color: var(--accent); color: var(--accent); }
.timer-trigger-label { font-size: 12px; color: var(--text3); font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; }
.timer-time { font-size: 28px; font-weight: 700; font-variant-numeric: tabular-nums; color: var(--accent); min-width: 68px; text-align: center; }
.timer-time.warning { color: var(--accent2); }
.timer-time.done { color: var(--red); }
.timer-right { display: flex; flex-direction: column; gap: 7px; }
.timer-label { font-size: 10px; color: var(--text3); font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; }
.timer-presets { display: flex; gap: 5px; }
.timer-preset { background: var(--bg3); border: 1px solid var(--border2); border-radius: 999px; padding: 4px 10px; color: var(--text2); font-size: 12px; font-weight: 600; cursor: pointer; font-family: inherit; transition: all 0.15s; }
.timer-preset:hover { border-color: var(--accent); color: var(--accent); }
.timer-stop { background: none; border: 1px solid var(--border); border-radius: 999px; padding: 4px 12px; color: var(--text3); font-size: 11px; cursor: pointer; font-family: inherit; }

/* ── LOG VIEW ── */
.view-hdr { margin-bottom: 1.25rem; }
.view-hdr h1 { font-size: 21px; font-weight: 700; letter-spacing: -0.3px; }
.view-hdr p { font-size: 13px; color: var(--text2); margin-top: 4px; }
.view-hdr-row { display: flex; align-items: flex-start; justify-content: space-between; }
.log-date-group { margin-bottom: 1.5rem; }
.log-date-label { font-size: 11px; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 8px; }
.log-entry { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; padding: 12px 14px; margin-bottom: 7px; }
.log-entry-name { font-size: 14px; font-weight: 600; margin-bottom: 8px; }
.log-set-row { display: flex; align-items: center; gap: 8px; font-size: 13px; padding: 3px 0; }
.log-set-num { color: var(--text3); font-weight: 600; min-width: 44px; }
.log-set-detail { color: var(--text2); }
.empty-state { text-align: center; padding: 3rem 1rem; color: var(--text3); font-size: 14px; line-height: 1.7; }
.empty-state .emoji { font-size: 2.2rem; display: block; margin-bottom: 10px; }

/* ── PROGRESS VIEW ── */
.pr-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 14px; padding: 14px 16px; margin-bottom: 10px; }
.pr-card-name { font-size: 14px; font-weight: 700; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.pr-badge { font-size: 10px; background: rgba(240,144,64,0.15); color: var(--accent2); padding: 2px 7px; border-radius: 999px; font-weight: 700; }
.pr-row { display: flex; justify-content: space-between; align-items: center; font-size: 13px; padding: 4px 0; border-bottom: 1px solid var(--border); }
.pr-row:last-child { border-bottom: none; }
.pr-row-date { color: var(--text3); }
.pr-row-val { font-weight: 600; }
.pr-row-val.is-pr { color: var(--accent2); }
.pr-chart { height: 44px; margin-top: 12px; }
.pr-bar-wrap { display: flex; align-items: flex-end; gap: 3px; height: 100%; }
.pr-bar { flex: 1; background: rgba(34,199,138,0.18); border-radius: 3px 3px 0 0; min-height: 3px; }
.pr-bar.latest { background: var(--accent); }
.clear-btn { font-size: 12px; color: var(--text3); cursor: pointer; background: none; border: 1px solid var(--border); border-radius: 8px; padding: 6px 11px; font-family: inherit; transition: all 0.15s; white-space: nowrap; }
.clear-btn:hover { color: var(--red); border-color: var(--red); }
</style>
</head>
<body>

<!-- TOP NAV: months -->
<nav class="top-nav">
  <div class="top-nav-inner" id="month-tabs"></div>
</nav>

<!-- PROGRAM VIEW -->
<div class="view active" id="view-program">
  <div class="week-tabs" id="week-tabs"></div>
  <div id="week-note" class="week-note"></div>
  <div class="timer-trigger">
    <span class="timer-trigger-label">Rest timer:</span>
    <button class="timer-trigger-btn" onclick="startTimer(90)">1:30</button>
    <button class="timer-trigger-btn" onclick="startTimer(150)">2:30</button>
    <button class="timer-trigger-btn" onclick="startTimer(180)">3:00</button>
  </div>
  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:var(--purple)"></div>Superset</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--blue)"></div>Outside gym</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--accent)"></div>Core (anytime)</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--accent)"></div>Tap exercise to log</div>
  </div>
  <div class="day-grid" id="day-grid"></div>
</div>

<!-- LOG VIEW -->
<div class="view" id="view-log">
  <div class="view-hdr-row">
    <div class="view-hdr"><h1>Workout Log</h1><p>All logged sets</p></div>
    <button class="clear-btn" onclick="clearLog()">Clear all</button>
  </div>
  <div id="log-content"></div>
</div>

<!-- PROGRESS VIEW -->
<div class="view" id="view-progress">
  <div class="view-hdr-row">
    <div class="view-hdr"><h1>Progress</h1><p>PRs and lift history</p></div>
  </div>
  <div id="progress-content"></div>
</div>

<!-- BOTTOM NAV -->
<nav class="bot-nav">
  <button class="bot-btn active" id="botnav-program" onclick="showView('program')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
    Program
  </button>
  <button class="bot-btn" id="botnav-log" onclick="showView('log')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
    Log
  </button>
  <button class="bot-btn" id="botnav-progress" onclick="showView('progress')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
    Progress
  </button>
</nav>

<!-- LOG MODAL -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModalOverlay(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modal-title"></div>
    <div class="modal-sub" id="modal-sub"></div>
    <div id="modal-prev"></div>
    <div class="modal-sets" id="modal-sets"></div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="dismissModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveLog()">Save &amp; Start Rest</button>
    </div>
  </div>
</div>

<!-- REST TIMER -->
<div class="timer-bar">
  <div class="timer-pill" id="timer-pill">
    <div class="timer-time" id="timer-display">2:30</div>
    <div class="timer-right">
      <div class="timer-label">Rest Timer</div>
      <div class="timer-presets">
        <button class="timer-preset" onclick="startTimer(90)">1:30</button>
        <button class="timer-preset" onclick="startTimer(150)">2:30</button>
        <button class="timer-preset" onclick="startTimer(180)">3:00</button>
      </div>
      <button class="timer-stop" onclick="stopTimer()">Dismiss</button>
    </div>
  </div>
</div>

<script>

:"Barbell Row",sets:"3 x 5",weight:"medium"}]},{title:"Superset — arms",isSuperset:true,exercises:[{name:"Incline DB Curl",sets:"2 x 10",weight:"light",note:"Bench at 45–60°. Arms hang behind body at bottom.",tags:["superset"]},{name:"Tricep Pushdown",sets:"2 x 10",weight:"light",tags:["superset"]}]},{title:"Superset — shoulder health",isSuperset:true,exercises:[{name:"Cable Cross-Body Lateral Raise",sets:"2 x 12",weight:"light",note:"Cable at low pulley, pull across body.",tags:["superset"]},{name:"Face Pull",sets:"2 x 15",weight:"light",tags:["superset"]}]},{title:"Vertical Jump Test — evening (separate)",exercises:[{name:"Full dynamic warm-up",sets:"10 min",weight:"bw",note:"Dynamic flex + a few approach jumps to prime.",tags:["outside"]},{name:"Max vertical test — approach jump",sets:"5–8 attempts",weight:"bw",note:"Measure and record. This is your Month 1 benchmark.",tags:["outside"]}]},{title:"Core — do anytime",isCoreBlock:true,exercises:[{name:"V-Up",sets:"2 x 12"},{name:"Plank",sets:"2 x 30 sec"}]}]},{name:"Saturday",type:"rest",label:"Full Rest",subtitle:"No training",time:"—",sections:[{title:"Optional",exercises:[{name:"Light walk or stretch only",sets:"—",weight:"bw",note:"Prep CNS for Month 2."}]}]},{name:"Sunday",type:"rest",label:"Full Rest",subtitle:"No training",time:"—",sections:[{title:"Notes",exercises:[{name:"Full rest",sets:"—",weight:"bw",note:"Month 1 complete. Review your vertical test. Month 2 loads up."}]}]}]}};

// Months registry — add future months here
var months = {
  1: { label: 'Month 1', weeks: weeks }
};
// Placeholder stubs for future months (locked until added)
var monthOrder = [1, 2, 3];
var monthLabels = { 1: 'Month 1', 2: 'Month 2', 3: 'Month 3' };

// ── STATE ──────────────────────────────────────────────
var currentMonth = 1;
var currentWeek = 1;
var openDays = {};
var currentModal = null;
var logQueue = [];
var logQueueIdx = 0;
var timerInterval = null;
var timerRemaining = 0;

// ── STORAGE ────────────────────────────────────────────
function getLog() {
  try { return JSON.parse(localStorage.getItem('workoutLog_v2') || '[]'); }
  catch(e) { return []; }
}
function appendLog(entry) {
  var log = getLog();
  log.push(entry);
  localStorage.setItem('workoutLog_v2', JSON.stringify(log));
}
function clearLog() {
  if (!confirm('Clear all logged workouts? This cannot be undone.')) return;
  localStorage.removeItem('workoutLog_v2');
  renderLog(); renderProgress();
}
function getLoggedToday(exKey) {
  var log = getLog();
  var today = new Date().toDateString();
  return log.filter(function(e) {
    return e.exKey === exKey && new Date(e.date).toDateString() === today;
  });
}
function getBestWeight(exKey) {
  var log = getLog();
  var entries = log.filter(function(e) { return e.exKey === exKey; });
  if (!entries.length) return null;
  var best = 0;
  entries.forEach(function(entry) {
    entry.sets.forEach(function(s) { if (s.weight && s.weight > best) best = s.weight; });
  });
  return best > 0 ? best : null;
}

// ── VIEWS ──────────────────────────────────────────────
function showView(name) {
  ['program','log','progress'].forEach(function(v) {
    document.getElementById('view-' + v).classList.remove('active');
    document.getElementById('botnav-' + v).classList.remove('active');
  });
  document.getElementById('view-' + name).classList.add('active');
  document.getElementById('botnav-' + name).classList.add('active');
  if (name === 'log') renderLog();
  if (name === 'progress') renderProgress();
}

// ── MONTH TABS ─────────────────────────────────────────
function renderMonthTabs() {
  var html = '';
  monthOrder.forEach(function(m) {
    var locked = !months[m];
    html += '<button class="month-tab' + (m === currentMonth ? ' active' : '') + (locked ? ' locked' : '') + '" onclick="' + (locked ? '' : 'setMonth(' + m + ')') + '">' + monthLabels[m] + (locked ? ' 🔒' : '') + '</button>';
  });
  document.getElementById('month-tabs').innerHTML = html;
}

function setMonth(m) {
  if (!months[m]) return;
  currentMonth = m;
  currentWeek = 1;
  openDays = {};
  renderMonthTabs();
  renderWeekTabs();
  renderWeek();
}

// ── WEEK TABS ──────────────────────────────────────────
function renderWeekTabs() {
  var monthData = months[currentMonth];
  if (!monthData) return;
  var weekKeys = Object.keys(monthData.weeks).map(Number).sort();
  var html = '';
  weekKeys.forEach(function(w) {
    var weekData = monthData.weeks[w];
    var label = weekData.shortLabel || ('Week ' + w);
    html += '<div class="week-tab' + (w === currentWeek ? ' active' : '') + '" onclick="setWeek(' + w + ')">' + label + '</div>';
  });
  document.getElementById('week-tabs').innerHTML = html;
}

function setWeek(w) {
  currentWeek = w;
  openDays = {};
  document.querySelectorAll('.week-tab').forEach(function(t, i) {
    t.classList.toggle('active', (i + 1) === w);
  });
  renderWeek();
}

// ── HELPERS ────────────────────────────────────────────
function weightBadge(w) {
  var map = { heavy:['w-heavy','Heavy'], medium:['w-medium','Moderate'], light:['w-light','Light'], bw:['w-bw','BW'], iso:['w-iso','Iso'] };
  var info = map[w] || ['w-bw','—'];
  return '<span class="ex-weight ' + info[0] + '">' + info[1] + '</span>';
}
function tagHtml(tags) {
  if (!tags || !tags.length) return '';
  return tags.map(function(t) {
    if (t === 'outside') return '<span class="tag tag-outside">outside</span>';
    if (t === 'superset') return '<span class="tag tag-superset">superset</span>';
    return '';
  }).join('');
}
function pillClass(t) { return {lower:'pill-lower',upper:'pill-upper',rest:'pill-rest'}[t] || 'pill-rest'; }
function parseSets(setsStr) { var m = setsStr.match(/(\d+)\s*x/); return m ? parseInt(m[1]) : 3; }
function safeStr(s) { return s.replace(/\\/g,'\\\\').replace(/'/g,"\\'"); }
function exKey(name) { return name.replace(/[^a-z0-9]/gi,'_').toLowerCase(); }

// ── RENDER WEEK ────────────────────────────────────────
function renderWeek() {
  var monthData = months[currentMonth];
  if (!monthData) return;
  var data = monthData.weeks[currentWeek];
  if (!data) return;
  document.getElementById('week-note').textContent = data.note;
  var grid = document.getElementById('day-grid');
  var html = '';
  var log = getLog();

  data.days.forEach(function(day, idx) {
    var isOpen = !!openDays[idx];
    var isLong = day.time && (day.time.indexOf('50') !== -1 || day.time.indexOf('60') !== -1);

    // Count how many exercises logged today for this day
    var today = new Date().toDateString();
    var todayKeys = [];
    day.sections.forEach(function(sec) {
      sec.exercises.forEach(function(ex) {
        todayKeys.push(exKey(ex.name));
      });
    });
    var loggedToday = log.filter(function(e) {
      return new Date(e.date).toDateString() === today && todayKeys.indexOf(e.exKey) !== -1;
    }).length;

    var bodyHtml = '';
    day.sections.forEach(function(sec) {
      if (sec.isCoreBlock) {
        bodyHtml += '<div class="core-block"><div class="core-block-title">Core block <span class="tag tag-core">do anytime</span></div>';
        sec.exercises.forEach(function(ex) {
          bodyHtml += '<div class="core-row"><span class="core-row-name">' + ex.name + '</span><span class="core-row-sets">' + ex.sets + '</span></div>';
        });
        bodyHtml += '</div>';
        return;
      }
      var rows = '';
      sec.exercises.forEach(function(ex) {
        var logable = ex.weight && ex.weight !== 'bw' && ex.weight !== 'iso';
        var key = exKey(ex.name);
        var loggedNow = log.some(function(e) { return e.exKey === key && new Date(e.date).toDateString() === today; });
        var clickAttr = logable ? ('onclick="openModal(event,\'' + safeStr(key) + '\',\'' + safeStr(ex.name) + '\',\'' + safeStr(ex.sets) + '\')"') : '';
        rows += '<div class="exercise-row' + (logable ? '' : ' not-logable') + '" ' + clickAttr + '>';
        rows += '<div class="ex-left">';
        rows += '<div class="ex-name">' + ex.name + '</div>';
        if (ex.note) rows += '<div class="ex-note">' + ex.note + '</div>';
        if (ex.tags && ex.tags.length) rows += '<div class="ex-tags">' + tagHtml(ex.tags) + '</div>';
        rows += '</div>';
        rows += '<div class="ex-right">';
        rows += '<div class="ex-sets-badge">' + ex.sets + '</div>';
        if (logable && loggedNow) rows += '<div class="ex-logged-dot" title="Logged today"></div>';
        if (ex.weight) rows += weightBadge(ex.weight);
        rows += '</div></div>';
      });
      if (sec.isSuperset) {
        bodyHtml += '<div class="section-label">' + sec.title + '</div><div class="superset-group">' + rows + '</div>';
      } else {
        bodyHtml += '<div class="section-label">' + sec.title + '</div>' + rows;
      }
    });

    html += '<div class="day-card">';
    html += '<div class="day-header" onclick="toggleDay(' + idx + ')">';
    html += '<div class="day-header-left">';
    html += '<span class="day-pill ' + pillClass(day.type) + '">' + day.label + '</span>';
    html += '<div><div class="day-name">' + day.name + '</div><div class="day-subtitle">' + day.subtitle + '</div></div>';
    html += '</div>';
    html += '<div class="day-meta">';
    if (loggedToday > 0) html += '<span class="day-log-count">' + loggedToday + ' logged</span>';
    html += '<span class="time-badge' + (isLong ? ' longer' : '') + '">' + day.time + '</span>';
    html += '<span class="chevron' + (isOpen ? ' open' : '') + '" data-idx="' + idx + '">&#9660;</span>';
    html += '</div></div>';
    html += '<div class="day-body' + (isOpen ? ' open' : '') + '" data-idx="' + idx + '">' + bodyHtml + '</div>';
    html += '</div>';
  });
  grid.innerHTML = html;
}

function toggleDay(idx) {
  var body = document.querySelector('.day-body[data-idx="' + idx + '"]');
  var chev = document.querySelector('.chevron[data-idx="' + idx + '"]');
  if (!body) return;
  if (openDays[idx]) {
    delete openDays[idx]; body.classList.remove('open'); chev.classList.remove('open');
  } else {
    openDays[idx] = true; body.classList.add('open'); chev.classList.add('open');
  }
}

// ── MODAL ──────────────────────────────────────────────
function buildDayQueue(dayIdx) {
  var weekData = months[currentMonth].weeks[currentWeek];
  var day = weekData.days[dayIdx];
  var queue = [];
  day.sections.forEach(function(sec) {
    if (sec.isCoreBlock) return;
    sec.exercises.forEach(function(ex) {
      if (ex.weight && ex.weight !== 'bw' && ex.weight !== 'iso') {
        queue.push({ exKey: safeStr(ex.name), exName: ex.name, setsStr: ex.sets, dayIdx: dayIdx });
      }
    });
  });
  return queue;
}

function openModal(e, key, name, setsStr) {
  e.stopPropagation();
  // Find which day this exercise belongs to by reading data-idx from the closest day-body
  var row = e.target.closest ? e.target.closest('.exercise-row') : null;
  var dayBody = row ? (row.closest ? row.closest('.day-body') : null) : null;
  var dayIdx = dayBody ? parseInt(dayBody.getAttribute('data-idx')) : -1;

  if (dayIdx >= 0) {
    logQueue = buildDayQueue(dayIdx);
    logQueueIdx = 0;
    for (var i = 0; i < logQueue.length; i++) {
      if (logQueue[i].exKey === key) { logQueueIdx = i; break; }
    }
  } else {
    logQueue = [{ exKey: key, exName: name, setsStr: setsStr, dayIdx: -1 }];
    logQueueIdx = 0;
  }
  showCurrentModal();
}

function showCurrentModal() {
  var item = logQueue[logQueueIdx];
  if (!item) return;
  var numSets = parseSets(item.setsStr);
  currentModal = { exKey: item.exKey, exName: item.exName, setsStr: item.setsStr, numSets: numSets };
  document.getElementById('modal-title').textContent = item.exName;

  var remaining = logQueue.length - logQueueIdx - 1;
  document.getElementById('modal-sub').textContent = item.setsStr + (remaining > 0 ? ' — ' + remaining + ' more exercise' + (remaining > 1 ? 's' : '') + ' in this day' : '');

  // Show previous best
  var best = getBestWeight(item.exKey);
  var prevHtml = '';
  if (best) {
    prevHtml = '<div class="modal-prev"><div class="modal-prev-label">Previous best</div><div class="modal-prev-row modal-prev-pr">' + best + ' lbs</div></div>';
  }
  document.getElementById('modal-prev').innerHTML = prevHtml;

  // Build set inputs with last-session placeholder
  var log = getLog();
  var lastEntry = null;
  for (var i = log.length - 1; i >= 0; i--) {
    if (log[i].exKey === item.exKey) { lastEntry = log[i]; break; }
  }
  var setsHtml = '';
  for (var j = 0; j < numSets; j++) {
    var prevW = (lastEntry && lastEntry.sets && lastEntry.sets[j] && lastEntry.sets[j].weight) ? lastEntry.sets[j].weight : '';
    setsHtml += '<div class="modal-set-row">';
    setsHtml += '<div class="modal-set-label">Set ' + (j + 1) + '</div>';
    setsHtml += '<div class="modal-col"><input class="modal-input" type="number" inputmode="decimal" placeholder="' + (prevW ? prevW : 'lbs') + '" id="sw-' + j + '"><div class="modal-input-label">weight</div></div>';
    setsHtml += '<div class="modal-col"><input class="modal-input" type="number" inputmode="numeric" placeholder="reps" id="sr-' + j + '"><div class="modal-input-label">reps</div></div>';
    setsHtml += '</div>';
  }
  document.getElementById('modal-sets').innerHTML = setsHtml;

  // Update button label
  var hasNext = logQueueIdx < logQueue.length - 1;
  var btn = document.querySelector('.btn-primary');
  if (btn) btn.textContent = hasNext ? 'Save & Next' : 'Save & Done';

  document.getElementById('modal-overlay').classList.add('open');
  setTimeout(function() { var f = document.getElementById('sw-0'); if (f) f.focus(); }, 280);
}

function closeModalOverlay(e) {
  if (e.target === document.getElementById('modal-overlay')) dismissModal();
}
function dismissModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  currentModal = null; logQueue = []; logQueueIdx = 0;
}

function saveLog() {
  if (!currentModal) return;
  var sets = [];
  for (var i = 0; i < currentModal.numSets; i++) {
    var wEl = document.getElementById('sw-' + i);
    var rEl = document.getElementById('sr-' + i);
    var w = wEl ? parseFloat(wEl.value) : NaN;
    var r = rEl ? parseInt(rEl.value) : NaN;
    if ((w > 0 && !isNaN(w)) || (r > 0 && !isNaN(r))) {
      sets.push({ weight: (w > 0 && !isNaN(w)) ? w : null, reps: (r > 0 && !isNaN(r)) ? r : null });
    }
  }
  if (sets.length) {
    appendLog({
      date: new Date().toISOString(),
      exKey: currentModal.exKey,
      exName: currentModal.exName,
      setsStr: currentModal.setsStr,
      sets: sets,
      month: currentMonth,
      week: currentWeek
    });
    startTimer(150);
  }
  // Auto-advance through the day's exercise queue
  logQueueIdx++;
  if (logQueueIdx < logQueue.length) {
    renderWeek();
    showCurrentModal();
  } else {
    dismissModal();
    renderWeek();
  }
}

// ── REST TIMER ─────────────────────────────────────────
function startTimer(seconds) {
  if (timerInterval) clearInterval(timerInterval);
  timerRemaining = seconds;
  document.getElementById('timer-pill').classList.add('visible');
  updateTimerDisplay();
  timerInterval = setInterval(function() {
    timerRemaining--;
    updateTimerDisplay();
    if (timerRemaining === 0 && navigator.vibrate) navigator.vibrate([200, 100, 200]);
  }, 1000);
}
function updateTimerDisplay() {
  var el = document.getElementById('timer-display');
  var abs = Math.abs(timerRemaining);
  var m = Math.floor(abs / 60);
  var s = abs % 60;
  el.textContent = (timerRemaining < 0 ? '+' : '') + m + ':' + (s < 10 ? '0' : '') + s;
  el.className = 'timer-time';
  if (timerRemaining <= 0) el.classList.add('done');
  else if (timerRemaining <= 20) el.classList.add('warning');
}
function stopTimer() {
  if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
  document.getElementById('timer-pill').classList.remove('visible');
}

// ── LOG VIEW ───────────────────────────────────────────
function renderLog() {
  var log = getLog();
  var el = document.getElementById('log-content');
  if (!log.length) {
    el.innerHTML = '<div class="empty-state"><span class="emoji">📋</span>No sets logged yet.<br>Tap any exercise in the program to log it.</div>';
    return;
  }
  var groups = {};
  var order = [];
  for (var i = log.length - 1; i >= 0; i--) {
    var entry = log[i];
    var d = new Date(entry.date);
    var key = d.toLocaleDateString('en-US', {weekday:'long', month:'short', day:'numeric'});
    if (!groups[key]) { groups[key] = []; order.push(key); }
    groups[key].push(entry);
  }
  var html = '';
  order.forEach(function(key) {
    html += '<div class="log-date-group"><div class="log-date-label">' + key + '</div>';
    groups[key].forEach(function(entry) {
      html += '<div class="log-entry"><div class="log-entry-name">' + entry.exName + '</div>';
      entry.sets.forEach(function(s, i) {
        var parts = [];
        if (s.weight) parts.push(s.weight + ' lbs');
        if (s.reps) parts.push(s.reps + ' reps');
        html += '<div class="log-set-row"><div class="log-set-num">Set ' + (i+1) + '</div><div class="log-set-detail">' + (parts.join(' x ') || '—') + '</div></div>';
      });
      html += '</div>';
    });
    html += '</div>';
  });
  el.innerHTML = html;
}

// ── PROGRESS VIEW ──────────────────────────────────────
function renderProgress() {
  var log = getLog();
  var el = document.getElementById('progress-content');
  if (!log.length) {
    el.innerHTML = '<div class="empty-state"><span class="emoji">📈</span>No data yet.<br>Log some sets to track your progress.</div>';
    return;
  }
  var byEx = {};
  var exOrder = [];
  log.forEach(function(entry) {
    if (!byEx[entry.exKey]) { byEx[entry.exKey] = { name: entry.exName, sessions: [] }; exOrder.push(entry.exKey); }
    var weights = entry.sets.map(function(s) { return s.weight; }).filter(function(w) { return w && w > 0; });
    if (!weights.length) return;
    byEx[entry.exKey].sessions.push({
      maxW: Math.max.apply(null, weights),
      label: new Date(entry.date).toLocaleDateString('en-US', {month:'short', day:'numeric'})
    });
  });
  // Dedupe exOrder
  var seen = {};
  exOrder = exOrder.filter(function(k) { if (seen[k]) return false; seen[k] = true; return true; });

  var html = '';
  exOrder.forEach(function(key) {
    var ex = byEx[key];
    if (!ex.sessions.length) return;
    var allMax = Math.max.apply(null, ex.sessions.map(function(s) { return s.maxW; }));
    var latest = ex.sessions[ex.sessions.length - 1];
    var isNewPR = ex.sessions.length > 1 && latest.maxW >= allMax;
    html += '<div class="pr-card">';
    html += '<div class="pr-card-name">' + ex.name + (isNewPR ? ' <span class="pr-badge">New PR ↑</span>' : '') + '</div>';
    html += '<div class="pr-history">';
    ex.sessions.slice(-5).reverse().forEach(function(s) {
      var isPR = s.maxW >= allMax;
      html += '<div class="pr-row"><div class="pr-row-date">' + s.label + '</div><div class="pr-row-val' + (isPR ? ' is-pr' : '') + '">' + s.maxW + ' lbs</div></div>';
    });
    html += '</div>';
    if (ex.sessions.length > 1) {
      html += '<div class="pr-chart"><div class="pr-bar-wrap">';
      ex.sessions.forEach(function(s, i) {
        var h = Math.round((s.maxW / allMax) * 100);
        html += '<div class="pr-bar' + (i === ex.sessions.length - 1 ? ' latest' : '') + '" style="height:' + h + '%"></div>';
      });
      html += '</div></div>';
    }
    html += '</div>';
  });
  el.innerHTML = html || '<div class="empty-state"><span class="emoji">📈</span>No weighted sets logged yet.</div>';
}

// ── INIT ───────────────────────────────────────────────
renderMonthTabs();
renderWeekTabs();
renderWeek();
</script>
